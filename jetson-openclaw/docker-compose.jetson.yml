# OpenClaw on Jetson Orin Nano — Docker Compose (alternative to native install)
#
# Use when you want container isolation. Requires pre-built ARM64 image (no local build on 8GB).
# Ollama runs NATIVELY on the host for GPU access; OpenClaw connects via host.docker.internal.
#
# Usage:
#   cp .env.example .env && edit secrets
#   docker compose -f docker-compose.jetson.yml up -d
#
# Do NOT build locally on 8GB — use the pre-built image.

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gateway
    restart: unless-stopped
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    environment:
      HOME: /home/node
      NODE_ENV: production
      NODE_OPTIONS: "--max-old-space-size=384"
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN in .env}
      OLLAMA_API_KEY: ollama-local
      OLLAMA_HOST: host.docker.internal:11434
    env_file:
      - path: .env
        required: false
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR:-${HOME}/.openclaw/workspace}:/home/node/.openclaw/workspace
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
