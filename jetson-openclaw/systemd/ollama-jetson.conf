# Ollama systemd drop-in for Jetson Orin Nano 8GB
# Install:
#   sudo mkdir -p /etc/systemd/system/ollama.service.d
#   sudo cp ollama-jetson.conf /etc/systemd/system/ollama.service.d/jetson.conf
#   sudo systemctl daemon-reload && sudo systemctl restart ollama

[Service]
# Listen on all interfaces so Docker can reach host Ollama (optional; use 127.0.0.1 for native-only)
Environment="OLLAMA_HOST=127.0.0.1:11434"
# Limit concurrent models — critical on 8GB unified memory
Environment="OLLAMA_MAX_LOADED_MODELS=1"
Environment="OLLAMA_NUM_PARALLEL=1"
Environment="OLLAMA_KEEP_ALIVE=5m"
# CUDA path for JetPack 6.x
Environment="PATH=/usr/local/cuda-12.6/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
Environment="LD_LIBRARY_PATH=/usr/local/cuda-12.6/lib64:/usr/lib/aarch64-linux-gnu/nvidia"
